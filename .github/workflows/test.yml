name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync

      - name: Run test suite
        run: uv run python -m unittest discover

      - name: Run Constitution check
        run: uv run speckify-check-constitution --all-files
